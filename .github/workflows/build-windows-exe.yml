name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE with PyInstaller
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name "Excel款色尺码拼接工具" app/excel_size_concat_tool.py

      - name: Zip output
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/Excel款色尺码拼接工具.exe" -DestinationPath "dist/Excel款色尺码拼接工具.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Excel款色尺码拼接工具-Windows-EXE
          path: dist/Excel款色尺码拼接工具.zip
          retention-days: 7
